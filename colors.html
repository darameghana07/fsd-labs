<!DOCTYPE html>
<html>
<head>
   <title> Colors</title>
   <style>

    #first, #second, #third, #four, #five, #six {

      height: 150px;

      width: 150px;

      display: flex;

      justify-content: center;

      align-items: center;

      margin-bottom: 10px;
    }

    #first {

       background-color: rgb(255, 150, 20);
    }

    #second {

       background-color:pink;
    }

    #third {

       background-color:hsl(68, 40%, 50%);
    }
    #four {

       background-color:rgba(25, 150, 20,0.5);
    }

    #five {

       background-color:hsla(68, 40%, 50%, 0.5);
    }
    #six {

       background-color:purple;
    }

    </style>

</head>

<body>

  <div id="first"> RGB Color format </div>

  <div id="second"> Hexa Decimal Color format </div>

  <div id="third">HSL Color Forst </div>

  <div id="four"> RGBA Color founat </div>

  <div id="five">HSLA Color format </div>

  <div id="six"> Color Name format </div>

</body>

</html>
