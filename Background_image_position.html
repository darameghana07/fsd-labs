<!DOCTYPE html>
<html>

<head>
    <title>Background Image Position</title>

    <style>
        body {
            height: 200vh;
            background-image: url("meghana.jpeg");
            background-repeat: no-repeat;
            background-position: center 50%;
            background-size: auto 60%;
            background-attachment: fixed;
        }
    </style>

</head>

<body>

    <h2>Scroll the page to see the fixed background image</h2>

</body>

</html>
