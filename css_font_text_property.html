<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Font and Text Properties</title>
    <style>
        #one {
            margin-top: 100px;
            margin-left: 50px;
            height: 200px;
            width: 200px;
            background-color: orange;
            transition: 3s;

            /* Required Font and Text Properties */
            font-size: 24px;             
            font-weight: bold;            
            font-style: italic;          
            text-decoration: underline;   
            text-transform: uppercase;    
            text-align: center;           
            line-height: 200px;          
        }

        #one:hover {
            transform: scale(2);           
        }
    </style>
</head>

<body>
    <div id="one">Transform</div>
</body>

</html>
